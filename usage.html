<h1>📋 使い方</h1><h2>計算タブ</h2><p>副業の種類を選び、月収入・本業年収・経費率・申告方法を設定すると手取り額・税金・確定申告の必要性が自動計算されます。</p><h2>税率表タブ</h2><p>本業年収を選ぶと、副業所得の金額別に税負担がわかる一覧表が表示されます。</p><h2>節税Tipsタブ</h2><p>副業収入の税金を合法的に減らす6つの方法と、役立つ関連ツールを紹介しています。</p><h2>申告ガイドタブ</h2><p>確定申告が必要かどうかの判定フローと、手順を解説しています。</p>
